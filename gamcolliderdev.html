<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAM COLLIDER - FULL CORPUS V2</title>
    <style>
        :root {
            --bg: #0a0a0c;
            --panel: #141418;
            --accent: #00ffcc;
            --noble: #aa88ff;
            --shatter: #ff3355;
            --locked: #00ffcc;
            --text: #e0e0e0;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        header {
            padding: 15px 25px;
            background: var(--panel);
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .tabs { display: flex; gap: 10px; }
        .tab {
            padding: 8px 20px;
            cursor: pointer;
            border-radius: 4px;
            background: #222;
            transition: 0.2s;
        }
        .tab.active { background: var(--accent); color: #000; font-weight: bold; }

        .main-content { flex: 1; display: flex; overflow: hidden; }
        .tab-content { display: none; width: 100%; height: 100%; }
        .tab-content.active { display: flex; }

        /* COLLIDER LAYOUT */
        .collider-grid { display: grid; grid-template-columns: 320px 1fr 320px; width: 100%; gap: 1px; background: #333; }
        .side-panel { background: var(--panel); display: flex; flex-direction: column; overflow: hidden; }
        .search-box { padding: 15px; border-bottom: 1px solid #333; }
        .search-box input {
            width: 100%; background: #000; border: 1px solid #444; color: #fff;
            padding: 8px; border-radius: 4px; box-sizing: border-box;
        }
        .element-list { flex: 1; overflow-y: auto; padding: 10px; }
        
        .ec {
            display: grid; grid-template-columns: 40px 1fr 60px;
            padding: 10px; margin-bottom: 5px; background: #1a1a20;
            border-radius: 4px; cursor: pointer; align-items: center;
        }
        .ec:hover { background: #252530; }
        .ec.sel-a { border-left: 4px solid var(--accent); background: #1a2a25; }
        .ec.sel-b { border-right: 4px solid var(--accent); background: #1a2a25; }
        .ec-sym { font-weight: bold; font-size: 1.1em; }
        .ec-z { font-size: 0.8em; color: #888; }
        .ec-tau { font-size: 0.8em; text-align: right; }
        .tc-n { color: var(--noble); }
        .tc-l { color: var(--locked); }
        .tc-s { color: var(--shatter); }

        .center-stage { background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; }
        .reaction-display { display: flex; align-items: center; gap: 30px; margin-bottom: 40px; }
        .node {
            width: 100px; height: 100px; border-radius: 50%; border: 2px dashed #444;
            display: flex; align-items: center; justify-content: center; font-size: 2em; font-weight: bold;
        }
        .node.active { border-style: solid; border-color: var(--accent); box-shadow: 0 0 20px rgba(0,255,204,0.2); }

        .controls { width: 100%; max-width: 400px; text-align: center; }
        .k-slider { width: 100%; margin: 20px 0; accent-color: var(--accent); }
        .fire-btn {
            width: 100%; padding: 15px; border: none; border-radius: 4px;
            background: var(--accent); color: #000; font-weight: bold;
            font-size: 1.2em; cursor: pointer;
        }
        .fire-btn:disabled { background: #333; color: #666; cursor: not-allowed; }

        #result-box { margin-top: 40px; width: 100%; min-height: 150px; border: 1px solid #333; border-radius: 8px; padding: 20px; }
        .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .big-tau { font-size: 2.5em; font-weight: bold; }
        .status-pill { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.8em; font-weight: bold; margin-top: 10px; }
        .sp-n { background: var(--noble); color: #000; }
        .sp-l { background: var(--locked); color: #000; }
        .sp-s { background: var(--shatter); color: #fff; }

        /* PTABLE LAYOUT */
        #tab-ptable { padding: 40px; justify-content: center; align-items: flex-start; overflow-y: auto; }
        .ptable-wrap { display: flex; flex-direction: column; gap: 5px; }
        .pt-row { display: flex; gap: 5px; }
        .pt-cell {
            width: 55px; height: 65px; background: var(--panel); border: 1px solid #333;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; position: relative; font-size: 0.9em;
        }
        .pt-cell:hover { border-color: var(--accent); z-index: 10; transform: scale(1.1); background: #222; }
        .pt-sym { font-weight: bold; font-size: 1.2em; }
        .spacer { background: transparent; border: none; cursor: default; }
        .spacer:hover { transform: none; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: bold; letter-spacing: 2px;">GAM COLLIDER <span style="color:var(--accent)">v2.1</span></div>
    <div class="tabs">
        <div class="tab active" onclick="showTab('collide')">COLLIDER</div>
        <div class="tab" onclick="showTab('ptable')">PERIODIC CORPUS</div>
    </div>
</header>

<div class="main-content">
    <div id="tab-collide" class="tab-content active">
        <div class="collider-grid">
            <div class="side-panel">
                <div class="search-box"><input type="text" placeholder="Search A..." oninput="filterList('a', this.value)"></div>
                <div id="list-a" class="element-list"></div>
            </div>

            <div class="center-stage">
                <div class="reaction-display">
                    <div id="node-a" class="node">A</div>
                    <div style="font-size: 2em; color: #444;">+</div>
                    <div id="node-b" class="node">B</div>
                </div>

                <div class="controls">
                    <div style="display:flex; justify-content: space-between; font-family: monospace;">
                        <span>BIAS OFFSET (k)</span>
                        <span id="k-val" style="color:var(--accent)">0.000</span>
                    </div>
                    <input type="range" class="k-slider" id="k-slider" min="0" max="6" step="0.001" value="0">
                    <button id="fire-btn" class="fire-btn" disabled onclick="doCollide()">INITIATE COLLISION</button>
                </div>

                <div id="result-box">
                    <div id="result-idle" style="text-align:center; color:#555; padding-top:40px;">Select target elements to begin synthesis</div>
                    <div id="result-inner" style="display:none"></div>
                </div>
            </div>

            <div class="side-panel">
                <div class="search-box"><input type="text" placeholder="Search B..." oninput="filterList('b', this.value)"></div>
                <div id="list-b" class="element-list"></div>
            </div>
        </div>
    </div>

    <div id="tab-ptable" class="tab-content">
        <div id="ptable-wrap" class="ptable-wrap"></div>
    </div>
</div>

<script>
const ANCHOR = 1.369;
const TL = 0.2;
const P_VE = Math.pow(ANCHOR / 1.4204, 1/3);

const PERIODIC = [
    {Z:1, sym:'H', name:'Hydrogen', P:1.000, N:2, B:1, A:13.60, grp:1, per:1},
    {Z:2, sym:'He',name:'Helium', P:1.700, N:2, B:0, A:24.59, grp:18, per:1},
    {Z:3, sym:'Li',name:'Lithium', P:1.300, N:2, B:1, A:5.39, grp:1, per:2},
    {Z:4, sym:'Be',name:'Beryllium', P:1.950, N:4, B:2, A:9.32, grp:2, per:2},
    {Z:5, sym:'B', name:'Boron', P:2.600, N:4, B:3, A:8.30, grp:13, per:2},
    {Z:6, sym:'C', name:'Carbon', P:3.250, N:4, B:4, A:11.26, grp:14, per:2},
    {Z:7, sym:'N', name:'Nitrogen', P:3.900, N:4, B:3, A:14.53, grp:15, per:2},
    {Z:8, sym:'O', name:'Oxygen', P:4.550, N:4, B:2, A:13.62, grp:16, per:2},
    {Z:9, sym:'F', name:'Fluorine', P:5.200, N:4, B:1, A:17.42, grp:17, per:2},
    {Z:10,sym:'Ne',name:'Neon', P:5.850, N:4, B:0, A:21.56, grp:18, per:2},
    {Z:11,sym:'Na',name:'Sodium', P:2.200, N:6, B:1, A:5.14, grp:1, per:3},
    {Z:12,sym:'Mg',name:'Magnesium', P:2.850, N:6, B:2, A:7.65, grp:2, per:3},
    {Z:13,sym:'Al',name:'Aluminum', P:3.500, N:6, B:3, A:5.99, grp:13, per:3},
    {Z:14,sym:'Si',name:'Silicon', P:4.150, N:6, B:4, A:8.15, grp:14, per:3},
    {Z:15,sym:'P', name:'Phosphorus', P:4.800, N:6, B:3, A:10.49, grp:15, per:3},
    {Z:16,sym:'S', name:'Sulfur', P:5.450, N:6, B:2, A:10.36, grp:16, per:3},
    {Z:17,sym:'Cl',name:'Chlorine', P:6.100, N:6, B:1, A:12.97, grp:17, per:3},
    {Z:18,sym:'Ar',name:'Argon', P:6.750, N:6, B:0, A:15.76, grp:18, per:3},
    {Z:19,sym:'K', name:'Potassium', P:2.200, N:8, B:1, A:4.34, grp:1, per:4},
    {Z:20,sym:'Ca',name:'Calcium', P:2.850, N:8, B:2, A:6.11, grp:2, per:4},
    {Z:21,sym:'Sc',name:'Scandium', P:3.000, N:8, B:3, A:6.56, grp:3, per:4},
    {Z:22,sym:'Ti',name:'Titanium', P:3.150, N:8, B:4, A:6.83, grp:4, per:4},
    {Z:23,sym:'V', name:'Vanadium', P:3.300, N:8, B:5, A:6.75, grp:5, per:4},
    {Z:24,sym:'Cr',name:'Chromium', P:3.450, N:8, B:6, A:6.77, grp:6, per:4},
    {Z:25,sym:'Mn',name:'Manganese', P:3.600, N:8, B:5, A:7.43, grp:7, per:4},
    {Z:26,sym:'Fe',name:'Iron', P:3.750, N:8, B:4, A:7.90, grp:8, per:4},
    {Z:27,sym:'Co',name:'Cobalt', P:3.900, N:8, B:3, A:7.88, grp:9, per:4},
    {Z:28,sym:'Ni',name:'Nickel', P:4.050, N:8, B:2, A:7.64, grp:10, per:4},
    {Z:29,sym:'Cu',name:'Copper', P:4.200, N:8, B:1, A:7.73, grp:11, per:4},
    {Z:30,sym:'Zn',name:'Zinc', P:4.350, N:8, B:2, A:9.39, grp:12, per:4},
    {Z:31,sym:'Ga',name:'Gallium', P:5.000, N:8, B:3, A:6.00, grp:13, per:4},
    {Z:32,sym:'Ge',name:'Germanium', P:5.650, N:8, B:4, A:7.90, grp:14, per:4},
    {Z:33,sym:'As',name:'Arsenic', P:6.300, N:8, B:3, A:9.81, grp:15, per:4},
    {Z:34,sym:'Se',name:'Selenium', P:6.950, N:8, B:2, A:9.75, grp:16, per:4},
    {Z:35,sym:'Br',name:'Bromine', P:7.600, N:8, B:1, A:11.81, grp:17, per:4},
    {Z:36,sym:'Kr',name:'Krypton', P:8.250, N:8, B:0, A:14.00, grp:18, per:4},
    {Z:37,sym:'Rb',name:'Rubidium', P:2.200, N:10, B:1, A:4.18, grp:1, per:5},
    {Z:38,sym:'Sr',name:'Strontium', P:2.850, N:10, B:2, A:5.70, grp:2, per:5},
    {Z:46,sym:'Pd',name:'Palladium', P:4.200, N:10, B:0, A:8.34, grp:10, per:5},
    {Z:47,sym:'Ag',name:'Silver', P:4.320, N:10, B:1, A:7.58, grp:11, per:5},
    {Z:50,sym:'Sn',name:'Tin', P:5.770, N:10, B:4, A:7.34, grp:14, per:5},
    {Z:51,sym:'Sb',name:'Antimony', P:4.440, N:10, B:3, A:8.64, grp:15, per:5},
    {Z:54,sym:'Xe',name:'Xenon', P:8.370, N:10, B:0, A:12.13, grp:18, per:5},
    {Z:74,sym:'W', name:'Tungsten', P:3.450, N:14, B:6, A:7.86, grp:6, per:6},
    {Z:78,sym:'Pt',name:'Platinum', P:4.050, N:14, B:2, A:8.96, grp:10, per:6},
    {Z:79,sym:'Au',name:'Gold', P:4.200, N:14, B:1, A:9.23, grp:11, per:6},
    {Z:82,sym:'Pb',name:'Lead', P:5.650, N:14, B:4, A:7.42, grp:14, per:6},
    {Z:83,sym:'Bi',name:'Bismuth', P:6.300, N:14, B:3, A:7.29, grp:15, per:6}
];

const SNSFT_ELS = [
    {sym:'Sv', name:'Soverium', coord:'9,9,1,46', P:P_VE, N:2, B:0, A:0, color:'#00ffcc'},
    {sym:'Ve', name:'Velium', coord:'9,9,1,47', P:P_VE, N:2, B:1, A:4.423, color:'#ffe066'},
    {sym:'Hi', name:'Higgsium', coord:'9,9,4,5', P:0.508, N:1, B:0.13, A:0.93, color:'#ff00ff'}
];

const ALL = [
    ...PERIODIC.map(e => ({...e, type:'atom', color:atomColor(e), id:e.sym})),
    ...SNSFT_ELS.map(e => ({...e, type:'snsft', Z:null, grp:null, per:null, id:e.sym})),
];

function tau(e) { return e.P > 0 ? e.B / e.P : 0; }
function atomColor(e) {
    const t = e.B / e.P;
    if (e.B === 0) return '#aa88ff';
    if (t < TL) return '#00ffcc';
    return '#ff3355';
}

function fuse(e1, e2, k) {
    const kk = Math.max(0, Math.min(k, Math.min(e1.B, e2.B)));
    const P_o = (e1.P * e2.P) / (e1.P + e2.P);
    const B_o = Math.max(0, e1.B + e2.B - 2 * kk);
    const A_o = Math.max(e1.A, e2.A);
    const t = P_o > 0 ? B_o / P_o : 999;
    const s = B_o === 0 ? 'n' : (t < TL ? 'l' : 's');
    return {P:P_o, N:e1.N+e2.N, B:B_o, A:A_o, tau:t, IM:(P_o + e1.N + e2.N + B_o + A_o) * ANCHOR, status:s};
}

let selA = null, selB = null;

function buildLists() {
    ['a', 'b'].forEach(side => {
        const div = document.getElementById('list-' + side);
        div.innerHTML = '';
        ALL.forEach(el => {
            const t = tau(el);
            const tc = el.B === 0 ? 'tc-n' : (t < TL ? 'tc-l' : 'tc-s');
            const d = document.createElement('div');
            d.className = 'ec'; d.dataset.id = el.id; d.dataset.side = side;
            d.innerHTML = `<span class="ec-sym" style="color:${el.color}">${el.sym}</span>` +
                          `<span class="ec-z">${el.Z ? 'Z=' + el.Z : el.coord || ''}</span>` +
                          `<span class="ec-tau ${tc}">τ${t.toFixed(2)}</span>`;
            d.addEventListener('click', () => pick(el, side));
            div.appendChild(d);
        });
    });
}

function filterList(side, query) {
    const q = query.toLowerCase();
    document.querySelectorAll(`#list-${side} .ec`).forEach(c => {
        const el = ALL.find(e => e.id === c.dataset.id);
        const m = el && (el.sym.toLowerCase().includes(q) || el.name.toLowerCase().includes(q) || (el.Z && String(el.Z).includes(q)));
        c.style.display = m ? '' : 'none';
    });
}

function pick(el, side) {
    if (side === 'a') {
        selA = el;
        const node = document.getElementById('node-a');
        node.textContent = el.sym;
        node.style.color = el.color;
        node.classList.add('active');
    } else {
        selB = el;
        const node = document.getElementById('node-b');
        node.textContent = el.sym;
        node.style.color = el.color;
        node.classList.add('active');
    }
    document.querySelectorAll('#list-a .ec').forEach(c => c.classList.toggle('sel-a', c.dataset.id === selA?.id));
    document.querySelectorAll('#list-b .ec').forEach(c => c.classList.toggle('sel-b', c.dataset.id === selB?.id));
    
    if (selA && selB) {
        document.getElementById('fire-btn').disabled = false;
    }
}

function doCollide() {
    if (!selA || !selB) return;
    const k = parseFloat(document.getElementById('k-slider').value);
    showResult(selA, selB, k, fuse(selA, selB, k));
}

function showResult(e1, e2, k, r) {
    const box = document.getElementById('result-box');
    document.getElementById('result-idle').style.display = 'none';
    const inner = document.getElementById('result-inner');
    inner.style.display = 'block';
    
    const statusText = r.status === 'n' ? 'NOBLE STATE' : (r.status === 'l' ? 'LOCKED' : 'SHATTER');
    const bc = r.status === 'n' ? 'var(--noble)' : (r.status === 'l' ? 'var(--locked)' : 'var(--shatter)');
    
    inner.innerHTML = `
        <div class="result-grid">
            <div>
                <div style="font-size:0.9em; color:#888;">COLLISION PRODUCT</div>
                <div style="font-size:1.4em; font-weight:bold; color:${bc}">${e1.sym}${e2.sym} [k=${k.toFixed(3)}]</div>
                <div class="status-pill sp-${r.status}">${statusText}</div>
            </div>
            <div style="text-align:right">
                <div class="big-tau" style="color:${bc}">τ ${r.tau.toFixed(4)}</div>
                <div style="font-size:1.2em; font-family:monospace;">IM: ${r.IM.toFixed(3)}</div>
            </div>
        </div>
        <div style="margin-top:20px; font-size:0.8em; color:#666; font-family:monospace; border-top:1px solid #222; padding-top:10px;">
            P_out: ${r.P.toFixed(6)} | B_out: ${r.B.toFixed(6)} | N_total: ${r.N}
        </div>
    `;
}

function buildPTable() {
    const wrap = document.getElementById('ptable-wrap');
    wrap.innerHTML = "";
    const rows = [
        [{Z:1},{Z:null,span:16},{Z:2}],
        [{Z:3},{Z:4},{Z:null,span:10},{Z:5},{Z:6},{Z:7},{Z:8},{Z:9},{Z:10}],
        [{Z:11},{Z:12},{Z:null,span:10},{Z:13},{Z:14},{Z:15},{Z:16},{Z:17},{Z:18}],
        [{Z:19},{Z:20},{Z:21},{Z:22},{Z:23},{Z:24},{Z:25},{Z:26},{Z:27},{Z:28},{Z:29},{Z:30},{Z:31},{Z:32},{Z:33},{Z:34},{Z:35},{Z:36}],
        [{Z:37},{Z:38},{Z:null,span:7},{Z:46},{Z:47},{Z:null,span:2},{Z:50},{Z:51},{Z:null,span:2},{Z:54}],
        [{Z:null,span:5},{Z:74},{Z:null,span:3},{Z:78},{Z:79},{Z:null,span:2},{Z:82},{Z:83},{Z:null,span:2}]
    ];
    rows.forEach(row => {
        const rd = document.createElement('div'); rd.className = 'pt-row';
        row.forEach(cell => {
            if (cell.Z === null) {
                for(let i=0; i<(cell.span||1); i++){
                    const sp = document.createElement('div'); sp.className = 'pt-cell spacer'; rd.appendChild(sp);
                }
            } else {
                const el = PERIODIC.find(e => e.Z === cell.Z);
                if (!el) return;
                const d = document.createElement('div'); d.className = 'pt-cell';
                d.innerHTML = `<span style="font-size:0.6em; color:#555; position:absolute; top:2px; left:4px;">${el.Z}</span>` +
                              `<span class="pt-sym" style="color:${el.color}">${el.sym}</span>`;
                d.onclick = () => { pick(el, 'a'); showTab('collide'); };
                rd.appendChild(d);
            }
        });
        wrap.appendChild(rd);
    });
}

function showTab(id) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + id).classList.add('active');
    document.querySelector(`.tab[onclick="showTab('${id}')"]`).classList.add('active');
}

document.getElementById('k-slider').oninput = function() {
    document.getElementById('k-val').textContent = parseFloat(this.value).toFixed(3);
};

// INIT
buildLists();
buildPTable();
</script>
</body>
</html>
