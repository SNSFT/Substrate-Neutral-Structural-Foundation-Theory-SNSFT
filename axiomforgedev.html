<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AxiomForge // Substrate-Neutral Structural Foundation Laws</title>
    <style>
        /* --- Core Theme & UI Reset --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #121212;
            color: #E0E0E0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- Header & Status Panel --- */
        header {
            background-color: #1a1a1a;
            border-bottom: 1px solid #00FF66;
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }
        .brand-block {
            display: flex;
            flex-direction: column;
        }
        .brand-title {
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 2px;
            color: #FFFFFF;
            text-transform: uppercase;
        }
        .brand-coordinate {
            font-family: monospace;
            font-size: 11px;
            color: #00FF66;
            margin-top: 2px;
        }
        .nav-tabs {
            display: flex;
            gap: 4px;
        }
        .tab-btn {
            background: none;
            border: 1px solid transparent;
            color: #888888;
            font-family: monospace;
            font-size: 12px;
            padding: 6px 16px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.15s ease;
        }
        .tab-btn:hover {
            color: #FFFFFF;
            border-color: #444444;
        }
        .tab-btn.active {
            color: #121212;
            background-color: #00FF66;
            border-color: #00FF66;
            font-weight: bold;
        }

        /* --- Main Workspace Architecture --- */
        .workspace {
            flex: 1;
            display: flex;
            position: relative;
            background-color: #121212;
        }
        .pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            height: 100%;
        }
        .pane-left {
            border-right: 1px solid #222222;
        }
        .pane-header {
            background-color: #161616;
            border-bottom: 1px solid #222222;
            padding: 8px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 38px;
        }
        .pane-title {
            font-family: monospace;
            font-size: 11px;
            color: #888888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .action-trigger {
            background: none;
            border: 1px solid #00FF66;
            color: #00FF66;
            font-family: monospace;
            font-size: 11px;
            padding: 2px 10px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s;
        }
        .action-trigger:hover {
            background-color: #00FF66;
            color: #121212;
        }

        /* --- Editor and Text Output Elements --- */
        textarea {
            flex: 1;
            background-color: #121212;
            color: #00FF66;
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 13px;
            line-height: 1.5;
            padding: 24px;
            border: none;
            resize: none;
            outline: none;
            tab-size: 4;
        }
        textarea::placeholder {
            color: #333333;
        }
        .output-pre {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 13px;
            line-height: 1.5;
            color: #FFFFFF;
            background-color: #141414;
        }

        /* --- System Footer --- */
        footer {
            background-color: #161616;
            border-top: 1px solid #222222;
            padding: 6px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: monospace;
            font-size: 11px;
            color: #555555;
            height: 28px;
        }
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #00FF66;
        }
        .status-dot {
            width: 6px;
            height: 6px;
            background-color: #00FF66;
            border-radius: 50%;
            box-shadow: 0 0 6px #00FF66;
        }
    </style>
</head>
<body>

    <header>
        <div class="brand-block">
            <div class="brand-title">AxiomForge</div>
            <div class="brand-coordinate">[9,9,9,9] // Automated Reduction Interface</div>
        </div>
        <div class="nav-tabs">
            <button class="tab-btn">Kernel</button>
            <button class="tab-btn active">Lean $\rightarrow$ MD</button>
            <button class="tab-btn">Preprint Export</button>
        </div>
    </header>

    <div class="workspace">
        
        <div class="pane pane-left">
            <div class="pane-header">
                <div class="pane-title">Source Input (.lean)</div>
                <button class="action-trigger" id="clearBtn">Clear Canvas</button>
            </div>
            <textarea id="leanInput" placeholder="-- Paste raw Lean 4 code here...&#10;/-!&#10;# Module Header&#10;-/&#10;theorem master_retained..."></textarea>
        </div>
        
        <div class="pane">
            <div class="pane-header">
                <div class="pane-title">Lossless Transduction Output (.md)</div>
                <button class="action-trigger" id="copyBtn">Copy Markdown</button>
            </div>
            <pre class="output-pre" id="mdOutput">Waiting for formal logic stream...</pre>
        </div>
        
    </div>

    <footer>
        <div class="status-indicator">
            <div class="status-dot"></div>
            <span>MANIFOLD STATUS: HOLDING</span>
        </div>
        <div>CI GREEN // 0 SORRY</div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const inputArea = document.getElementById('leanInput');
            const outputPane = document.getElementById('mdOutput');
            const clearBtn = document.getElementById('clearBtn');
            const copyBtn = document.getElementById('copyBtn');

            // Pure Lossless Transduction Parser
            function transpileLeanToMarkdown(leanText) {
                if (!leanText.trim()) return "Waiting for formal logic stream...";

                const normalized = leanText.replace(/\r\n/g, '\n');
                const lines = normalized.split('\n');
                
                let mdLines = [];
                let currentCodeBlock = [];
                let inBlockComment = false;

                function flushCodeBlock() {
                    if (currentCodeBlock.length > 0) {
                        const codeText = currentCodeBlock.join('\n').trim();
                        if (codeText) {
                            mdLines.push("```lean");
                            mdLines.push(codeText);
                            mdLines.push("```\n");
                        }
                        currentCodeBlock = [];
                    }
                }

                for (let i = 0; i < lines.length; i++) {
                    let line = lines[i];
                    let stripped = line.trim();

                    // Track multi-line comment containment
                    if (inBlockComment) {
                        if (line.includes("-/")) {
                            let endIdx = line.indexOf("-/");
                            let commentPart = line.substring(0, endIdx).trim();
                            if (commentPart) mdLines.push(commentPart);
                            inBlockComment = false;
                            
                            let remainder = line.substring(endIdx + 2).trim();
                            if (remainder) {
                                lines[i] = remainder;
                                i--; 
                            }
                        } else {
                            mdLines.push(line);
                        }
                        continue;
                    }

                    // Intercept documentation structural limits
                    if (stripped.startsWith("/-!") || stripped.startsWith("/--") || stripped.startsWith("/-")) {
                        flushCodeBlock();
                        let isModuleDoc = stripped.startsWith("/-!");
                        let isDeclDoc = stripped.startsWith("/--");
                        
                        let startOffset = isModuleDoc ? 3 : (isDeclDoc ? 3 : 2);
                        let startIdx = line.indexOf(isModuleDoc ? "/-!" : (isDeclDoc ? "/--" : "/-"));
                        let firstLine = line.substring(startIdx + startOffset);

                        if (firstLine.includes("-/")) {
                            let closerIdx = firstLine.indexOf("-/");
                            mdLines.push(firstLine.substring(0, closerIdx).trim());
                            mdLines.push(""); 
                            
                            let remainder = firstLine.substring(closerIdx + 2).trim();
                            if (remainder) {
                                lines[i] = remainder;
                                i--;
                            }
                        } else {
                            mdLines.push(firstLine.trimEnd());
                            inBlockComment = true;
                        }
                        continue;
                    }

                    // Line Comments outside of active verification environments
                    if (stripped.startsWith("--")) {
                        flushCodeBlock();
                        let commentText = line.substring(line.indexOf("--") + 2).trim();
                        mdLines.push(commentText);
                        mdLines.push("");
                        continue;
                    }

                    // Empty spaces treat as block boundaries
                    if (!stripped) {
                        if (currentCodeBlock.length > 0) {
                            currentCodeBlock.push("");
                        }
                        continue;
                    }

                    currentCodeBlock.push(line);
                }

                flushCodeBlock();
                return mdLines.join('\n');
            }

            // Sync Transduction Real-Time
            inputArea.addEventListener('input', () => {
                outputPane.textContent = transpileLeanToMarkdown(inputArea.value);
            });

            // Wipe Board
            clearBtn.addEventListener('click', () => {
                inputArea.value = '';
                outputPane.textContent = "Waiting for formal logic stream...";
                inputArea.focus();
            });

            // Clipboard Integration
            copyBtn.addEventListener('click', () => {
                const textToCopy = outputPane.textContent;
                if (textToCopy && textToCopy !== "Waiting for formal logic stream...") {
                    navigator.clipboard.writeText(textToCopy).then(() => {
                        const originalText = copyBtn.textContent;
                        copyBtn.textContent = "Copied!";
                        copyBtn.style.color = "#FFFFFF";
                        copyBtn.style.backgroundColor = "#00FF66";
                        setTimeout(() => {
                            copyBtn.textContent = originalText;
                            copyBtn.style.color = "#00FF66";
                            copyBtn.style.backgroundColor = "transparent";
                        }, 1000);
                    });
                }
            });
        });
    </script>
</body>
</html>
